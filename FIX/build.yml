name: Build StateScript deb

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install ldid xz

      - name: Setup Theos
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          git clone --recursive --depth 1 https://github.com/theos/theos.git "$THEOS"

      - name: Link iOS SDK from Xcode
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          SDK_PATH="$(xcrun --sdk iphoneos --show-sdk-path)"
          SDK_NAME="$(basename "$SDK_PATH")"
          mkdir -p "$THEOS/sdks"
          ln -sf "$SDK_PATH" "$THEOS/sdks/$SDK_NAME"
          ln -sf "$SDK_PATH" "$THEOS/sdks/iPhoneOS16.5.sdk"
          echo "SDK=$SDK_NAME"
          ls -la "$THEOS/sdks/"

      - name: Setup ImGui
        run: bash scripts/setup_imgui.sh

      - name: Build .deb package
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          make clean || true
          make package FINALPACKAGE=1 2>&1 | tee build.log
          tail -n 100 build.log
          ls -la packages/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: StateScript-deb
          path: packages/*.deb
          if-no-files-found: error
          retention-days: 30
